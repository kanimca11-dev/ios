name: AppifyWebiOS

options:
  bundleIdPrefix: com.example.appifyweb
  deploymentTarget:
    iOS: "15.0"

targets:
  AppifyWebiOS:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources: [AppifyWebiOS]

    # System frameworks required by new features
    dependencies:
      - sdk: LocalAuthentication.framework   # BiometricLockView
      - sdk: Network.framework               # NetworkMonitor
      - sdk: WebKit.framework                # WKWebView
      - sdk: UserNotifications.framework     # PushNotificationService
      - sdk: UniformTypeIdentifiers.framework # File upload (UTType)

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.appifyweb
        INFOPLIST_FILE: AppifyWebiOS/Info.plist
        DEVELOPMENT_TEAM: ""          # Set via CI / Xcode signing
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
        SWIFT_VERSION: "5.9"

    info:
      path: AppifyWebiOS/Info.plist
      properties:
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        # Display name shown under the app icon — replaced by CI at build time
        CFBundleDisplayName: "APPIFYWEB_DISPLAY_NAME"

        # ── Build-injected values (override in CI via -xcconfig or xcodebuild args) ──
        API_BASE_URL: "https://www.appifyweb24.com/backend/index.php"
        APP_TOKEN: "default_token"

        # ── Permissions ───────────────────────────────────────────────────────
        NSFaceIDUsageDescription: "This app uses Face ID to protect your account."
        NSCameraUsageDescription: "This app needs camera access to upload photos."
        NSPhotoLibraryUsageDescription: "This app needs photo library access to upload images."
        NSLocationWhenInUseUsageDescription: "This app may use your location to improve your experience."

        # ── Orientation (runtime-adjustable via requestGeometryUpdate) ────────
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

        # ── Push notifications (Background Modes) ────────────────────────────
        UIBackgroundModes:
          - remote-notification
          - fetch

        # ── Launch screen (full storyboard — supports splash image) ───────────
        UILaunchStoryboardName: LaunchScreen

        UIUserInterfaceStyle: Light
        # Force white status bar text (suits dark secondary-color nav bars)
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIViewControllerBasedStatusBarAppearance: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true   # Dev only — restrict in production
